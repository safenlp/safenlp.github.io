project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!publications/_template/"


website:
  title: "safenlp.org"
  site-url: "https://safenlp.org"
  repo-url: "https://github.com/safenlp/safenlp.github.io"
  favicon: images/favicon_safenlp_32x32.png
  google-analytics: "UA-177339812-1"
  twitter-card: true
  #back-to-top-navigation: true
  page-navigation: false
  search: true
  page-footer: 
    background: "#F6F5F3"
    center: © 2026 · safenlp.org · Built by SafeNLP Team with Quarto
    right:
      - icon: github
        href: https://github.com/MasielloGroup/MasielloGroupWebsite
  
  navbar:
    search: true
    title: false
    logo: images/logo_safenlp.png
    background: "#F6F5F3"
    logo-alt: "safenlp.org"
    left:
      - text: Blog
        href: https://blog.safenlp.org/
        target: _blank
      - href: publications/index.qmd
      - href: events/index.qmd
        text: "Key Talks & Events"
      - text: Courses
        href: https://courses.safenlp.org/
        target: _blank
      - href: about.qmd
        text: About
      - href: contact.qmd
        text: Contact

  sidebar:
    - id: empty-to-suppress-sidebars-on-other-pages


format:
  html:
    theme: 
      - styles/custom.scss
      - yeti
    mainfont: Nunito Sans
    toc: true
    link-external-newwindow: true
    date-format: "MMM YYYY"
    smooth-scroll: true
    resources:
      - images



